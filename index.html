<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #223050;
    --accent: #4f9ef8;
    --accent2: #93c5fd;
    --rose: #e88d8d;
    --mint: #7dd3b0;
    --lavender: #818cf8;
    --red: #ef4444;
    --yellow: #f59e0b;
    --green: #10b981;
    --blue: #60a5fa;
    --text: #f0ede8;
    --text2: #b0a9c0;
    --text3: #6b6480;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    right: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(79,158,248,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    left: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(129,140,248,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,26,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    padding-top: env(safe-area-inset-top);
  }

  .header-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .logo-svg { width: 42px; height: 42px; flex-shrink: 0; }
  .logo-text { line-height: 1; }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    font-weight: 400;
    margin-top: 2px;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--green);
    transition: all 0.3s;
  }
  .sync-dot.syncing { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 1s infinite; }
  .sync-dot.offline { background: var(--text3); box-shadow: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .nav {
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  .nav-inner { max-width: 480px; margin: 0 auto; display: flex; }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 4px;
    border: none;
    background: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
    position: relative;
  }

  .nav-btn.active { color: #4f9ef8; }
  .nav-btn-icon { font-size: 22px; line-height: 1; transition: transform 0.2s; }
  .nav-btn.active .nav-btn-icon { transform: scale(1.1); }

  .nav-badge {
    position: absolute;
    top: 8px;
    right: calc(50% - 18px);
    background: var(--rose);
    color: white;
    font-size: 9px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  .main {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 100px;
    position: relative;
    z-index: 1;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  .alert-banner {
    background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(245,158,11,0.1));
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 16px;
    display: none;
  }
  .alert-banner.show { display: flex; align-items: center; gap: 10px; }
  .alert-banner-text { font-size: 13px; line-height: 1.4; }
  .alert-banner-text strong { color: var(--rose); }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .search-bar { position: relative; margin-bottom: 14px; }

  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 11px 16px 11px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: #4f9ef8; }
  .search-bar input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.5;
  }

  .chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; margin-bottom: 14px; }
  .chips::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 50px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip.active { background: #4f9ef8; border-color: #4f9ef8; color: #ffffff; font-weight: 600; }

  .btn-add {
    width: 100%;
    background: linear-gradient(135deg, #4f9ef8, #2563eb);
    color: #ffffff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn-add:active { transform: scale(0.97); opacity: 0.9; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  .item-row:last-child { border-bottom: none; }
  .item-row:active { background: rgba(255,255,255,0.03); }

  .item-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
    background: transparent;
  }
  .item-check.done { background: var(--mint); border-color: var(--mint); }
  .item-row.done-row .item-name { text-decoration: line-through; opacity: 0.5; }

  .item-info { flex: 1; min-width: 0; }

  .item-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.2s;
  }

  .item-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .item-tag { background: rgba(255,255,255,0.06); border-radius: 4px; padding: 1px 6px; font-size: 10px; }
  .item-tag.urgent { background: rgba(239,68,68,0.2); color: var(--rose); }
  .item-tag.from-stock { background: rgba(167,139,250,0.2); color: var(--lavender); }

  .item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.12); }
  .btn-icon.danger:hover { background: rgba(239,68,68,0.2); color: var(--rose); }

  .stock-badge {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    white-space: nowrap;
  }
  .stock-badge:active { transform: scale(0.95); }
  .stock-cheio { background: rgba(16,185,129,0.15); color: var(--mint); }
  .stock-ok { background: rgba(96,165,250,0.15); color: var(--blue); }
  .stock-baixo { background: rgba(245,158,11,0.2); color: var(--yellow); }
  .stock-zerado { background: rgba(239,68,68,0.2); color: var(--rose); }

  .item-row.stock-baixo-row { border-left: 3px solid var(--yellow); }
  .item-row.stock-zerado-row { border-left: 3px solid var(--rose); }

  .btn-send-list {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(167,139,250,0.3);
    background: rgba(167,139,250,0.1);
    color: var(--lavender);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-send-list:hover { background: rgba(167,139,250,0.2); }

  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }
  .empty-sub { font-size: 13px; margin-top: 6px; opacity: 0.7; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    width: 100%;
    max-width: 460px;
    padding: 24px;
    animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 90dvh;
    overflow-y: auto;
  }
  @keyframes modalIn { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--accent2);
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #4f9ef8; }
  .form-select option { background: var(--surface2); }

  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  .form-check-row { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 0; }

  .form-check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border2);
    background: transparent;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
  }
  .form-check.checked { background: #4f9ef8; border-color: #4f9ef8; }

  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }

  .btn-cancel {
    flex: 1;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
  }

  .btn-save {
    flex: 2;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, #4f9ef8, #2563eb);
    color: #ffffff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:active { opacity: 0.85; }

  .manage-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .manage-row:last-child { border-bottom: none; }

  .manage-emoji-preview {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .manage-name { flex: 1; font-size: 14px; font-weight: 500; }
  .manage-info { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .badge-default {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    color: var(--text3);
    font-weight: 500;
    flex-shrink: 0;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    max-height: 180px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .emoji-grid::-webkit-scrollbar { display: none; }

  .emoji-opt {
    width: 100%;
    aspect-ratio: 1;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    background: var(--surface2);
    transition: all 0.15s;
  }
  .emoji-opt.selected { border-color: #4f9ef8; background: rgba(79,158,248,0.15); }
  .emoji-opt:active { transform: scale(0.9); }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loader { text-align: center; padding: 32px; color: var(--text3); font-size: 13px; }

  .section-divider {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 0 8px;
  }

  .qty-input { width: 70px; }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .color-swatch.selected { border-color: white; transform: scale(1.2); }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .preview-card {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .preview-emoji-box {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .btn-sm {
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary-sm { background: #4f9ef8; color: #ffffff; }
  .btn-danger-sm { background: rgba(239,68,68,0.15); color: var(--rose); border: 1px solid rgba(239,68,68,0.2); }
</style>

</head>
<body>

<!-- HEADER -->

  <div class="header-inner">
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="36" fill="rgba(232,184,109,0.08)"/>
        <circle cx="28" cy="24" r="8" fill="#4f9ef8" opacity="0.9"/>
        <path d="M16 48 Q16 36 28 36 Q35 36 35 42" fill="none" stroke="#4f9ef8" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
        <circle cx="52" cy="24" r="8" fill="#a78bfa" opacity="0.9"/>
        <path d="M64 48 Q64 36 52 36 Q45 36 45 42" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
        <path d="M35 32 Q40 36 45 32" fill="none" stroke="#e88d8d" stroke-width="2" stroke-linecap="round"/>
        <path d="M40 27 C40 27 37 23 34 25 C31 27 32 31 40 36 C48 31 49 27 46 25 C43 23 40 27 40 27Z" fill="#e88d8d"/>
        <rect x="22" y="56" width="36" height="14" rx="4" fill="none" stroke="#4f9ef8" stroke-width="2.5"/>
        <circle cx="30" cy="73" r="3" fill="#4f9ef8"/>
        <circle cx="50" cy="73" r="3" fill="#4f9ef8"/>

<script>
const DEFAULT_CATS = [
  { id: 'c1', nome: 'Hortifruti', emoji: '🥦', cor: '#7dd3b0', padrao: true },
  { id: 'c2', nome: 'Carnes', emoji: '🥩', cor: '#e88d8d', padrao: true },
  { id: 'c3', nome: 'Laticínios', emoji: '🧀', cor: '#f59e0b', padrao: true },
  { id: 'c4', nome: 'Padaria', emoji: '🍞', cor: '#d4a55a', padrao: true },
  { id: 'c5', nome: 'Bebidas', emoji: '🧃', cor: '#60a5fa', padrao: true },
  { id: 'c6', nome: 'Limpeza', emoji: '🧹', cor: '#a78bfa', padrao: true },
  { id: 'c7', nome: 'Higiene', emoji: '🧴', cor: '#f472b6', padrao: true },
  { id: 'c8', nome: 'Mercearia', emoji: '🛒', cor: '#e8b86d', padrao: true },
  { id: 'c9', nome: 'Congelados', emoji: '🧊', cor: '#93c5fd', padrao: true },
  { id: 'c10', nome: 'Outros', emoji: '📦', cor: '#6b6480', padrao: true },
];

let db_lista = {}, db_estoque = {}, db_cats = {};
let filtroLista = 'todos', filtroEstoque = 'todos';
let selectedEmoji = '🛒', selectedColor = '#4f9ef8';
let urgente = false, editCatIsDefault = false;

const useFirebase = () => window.firebaseReady && window.firebaseDB;
function fbRef(path) { return window.firebaseRef(window.firebaseDB, path); }

async function fbGet(path) {
  if (!useFirebase()) return null;
  const snap = await window.firebaseGet(fbRef(path));
  return snap.exists() ? snap.val() : null;
}
async function fbSet(path, val) {
  if (!useFirebase()) { lsSave(); return; }
  await window.firebaseSet(fbRef(path), val);
}
async function fbRemove(path) {
  if (!useFirebase()) { lsSave(); return; }
  await window.firebaseRemove(fbRef(path));
}
async function fbUpdate(path, val) {
  if (!useFirebase()) { lsSave(); return; }
  await window.firebaseUpdate(fbRef(path), val);
}

function lsSave() {
  localStorage.setItem('gt_lista', JSON.stringify(db_lista));
  localStorage.setItem('gt_estoque', JSON.stringify(db_estoque));
  localStorage.setItem('gt_cats', JSON.stringify(db_cats));
}

function lsLoad() {
  db_lista = JSON.parse(localStorage.getItem('gt_lista') || '{}');
  db_estoque = JSON.parse(localStorage.getItem('gt_estoque') || '{}');
  const saved = JSON.parse(localStorage.getItem('gt_cats') || 'null');
  if (saved && Object.keys(saved).length > 0) {
    db_cats = saved;
  } else {
    db_cats = {};
    DEFAULT_CATS.forEach(c => db_cats[c.id] = c);
    lsSave();
  }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

window.addEventListener('firebaseLoaded', async () => { await initData(); });

setTimeout(() => {
  if (!window.firebaseReady) {
    lsLoad(); render(); setSyncStatus('offline');
  }
}, 3000);

async function initData() {
  setSyncStatus('syncing');
  try {
    if (useFirebase()) {
      let cats = await fbGet('gabi-tali/cats');
      if (!cats) {
        cats = {};
        DEFAULT_CATS.forEach(c => cats[c.id] = c);
        await fbSet('gabi-tali/cats', cats);
      }
      db_cats = cats;
      db_lista = (await fbGet('gabi-tali/lista')) || {};
      db_estoque = (await fbGet('gabi-tali/estoque')) || {};

      window.firebaseOnValue(fbRef('gabi-tali/lista'), snap => {
        db_lista = snap.exists() ? snap.val() : {};
        renderLista(); updateBadges();
      });
      window.firebaseOnValue(fbRef('gabi-tali/estoque'), snap => {
        db_estoque = snap.exists() ? snap.val() : {};
        renderEstoque(); updateBadges();
      });
      window.firebaseOnValue(fbRef('gabi-tali/cats'), snap => {
        db_cats = snap.exists() ? snap.val() : {};
        renderCats(); refreshCatSelects();
      });
      setSyncStatus('online');
    } else {
      lsLoad(); setSyncStatus('offline');
    }
  } catch(e) {
    console.error(e); lsLoad(); setSyncStatus('offline');
  }
  render();
}

function setSyncStatus(s) {
  document.getElementById('syncDot').className = 'sync-dot ' + (s === 'online' ? '' : s);
}

function render() { renderLista(); renderEstoque(); renderCats(); refreshCatSelects(); updateBadges(); }

function goTo(screen, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  btn.classList.add('active');
}

function setFiltroLista(f, btn) {
  filtroLista = f;
  document.querySelectorAll('#chipsFiltroLista .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
}

function renderLista() {
  const q = (document.getElementById('searchLista')?.value || '').toLowerCase();
  let items = Object.values(db_lista);
  if (filtroLista === 'pendentes') items = items.filter(i => !i.done);
  else if (filtroLista === 'feitos') items = items.filter(i => i.done);
  else if (filtroLista === 'urgentes') items = items.filter(i => i.urgente && !i.done);
  if (q) items = items.filter(i => i.nome.toLowerCase().includes(q));
  items.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.urgente !== b.urgente) return a.urgente ? -1 : 1;
    return a.nome.localeCompare(b.nome);
  });

  const urgentes = Object.values(db_lista).filter(i => i.urgente && !i.done);
  const banner = document.getElementById('alertBanner');
  if (urgentes.length > 0) {
    banner.classList.add('show');
    document.getElementById('alertText').innerHTML = `<strong>${urgentes.length} item${urgentes.length > 1 ? 's' : ''} urgente${urgentes.length > 1 ? 's' : ''}</strong>: ${urgentes.map(i => i.nome).join(', ')}`;
  } else { banner.classList.remove('show'); }

  const container = document.getElementById('listaContainer');
  if (items.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🛒</div><div class="empty-text">Lista vazia!</div><div class="empty-sub">Adicione itens ou mande do estoque</div></div>`;
    return;
  }

  const bycat = {};
  items.forEach(i => {
    const cat = i.catId ? (db_cats[i.catId] || { nome: 'Outros', emoji: '📦' }) : { nome: 'Geral', emoji: '🛒' };
    if (!bycat[cat.nome]) bycat[cat.nome] = { cat, items: [] };
    bycat[cat.nome].items.push(i);
  });

  let html = '';
  Object.values(bycat).forEach(({ cat, items: its }) => {
    html += `<div class="section-divider" style="padding:10px 14px 4px; border-bottom:1px solid var(--border)">${cat.emoji} ${cat.nome}</div>`;
    its.forEach(item => {
      html += `<div class="item-row ${item.done ? 'done-row' : ''}" id="row-${item.id}">
        <div class="item-check ${item.done ? 'done' : ''}" onclick="toggleItem('${item.id}')">${item.done ? '✓' : ''}</div>
        <div class="item-info">
          <div class="item-name">${item.nome}</div>
          <div class="item-meta">
            <span>${item.qtd || 1} ${item.unit || 'un'}</span>
            ${item.obs ? `<span class="item-tag">${item.obs}</span>` : ''}
            ${item.urgente ? '<span class="item-tag urgent">Urgente</span>' : ''}
            ${item.fromStock ? '<span class="item-tag from-stock">📦 do estoque</span>' : ''}
          </div>
        </div>
        <div class="item-actions">
          <button class="btn-icon" onclick="openEditItem('${item.id}')">✏️</button>
          <button class="btn-icon danger" onclick="deleteItem('${item.id}')">✕</button>
        </div>
      </div>`;
    });
  });
  container.innerHTML = html;
}

function openAddItem(prefill) {
  document.getElementById('modalItemTitle').textContent = 'Novo item';
  document.getElementById('editItemId').value = '';
  document.getElementById('inputItemNome').value = prefill?.nome || '';
  document.getElementById('inputItemQtd').value = prefill?.qtd || '1';
  document.getElementById('inputItemUnit').value = prefill?.unit || 'un';
  document.getElementById('inputItemObs').value = prefill?.obs || '';
  urgente = false; updateUrgenteCheck();
  refreshCatSelects(prefill?.catId);
  openModal('modalItem');
}

function openEditItem(id) {
  const item = db_lista[id];
  if (!item) return;
  document.getElementById('modalItemTitle').textContent = 'Editar item';
  document.getElementById('editItemId').value = id;
  document.getElementById('inputItemNome').value = item.nome;
  document.getElementById('inputItemQtd').value = item.qtd || 1;
  document.getElementById('inputItemUnit').value = item.unit || 'un';
  document.getElementById('inputItemObs').value = item.obs || '';
  urgente = !!item.urgente; updateUrgenteCheck();
  refreshCatSelects(item.catId);
  openModal('modalItem');
}

async function saveItem() {
  const nome = document.getElementById('inputItemNome').value.trim();
  if (!nome) { showToast('Digite o nome do item!'); return; }
  const id = document.getElementById('editItemId').value || uid();
  const item = {
    id, nome,
    qtd: parseFloat(document.getElementById('inputItemQtd').value) || 1,
    unit: document.getElementById('inputItemUnit').value,
    catId: document.getElementById('inputItemCat').value || '',
    obs: document.getElementById('inputItemObs').value.trim(),
    urgente, done: db_lista[id]?.done || false,
    fromStock: db_lista[id]?.fromStock || false, ts: Date.now()
  };
  db_lista[id] = item;
  await fbSet(`gabi-tali/lista/${id}`, item);
  lsSave(); closeModal('modalItem'); renderLista(); updateBadges();
  showToast('✅ Item salvo!');
}

async function toggleItem(id) {
  const item = db_lista[id];
  if (!item) return;
  item.done = !item.done;
  await fbUpdate(`gabi-tali/lista/${id}`, { done: item.done });
  lsSave(); renderLista(); updateBadges();
}

async function deleteItem(id) {
  delete db_lista[id];
  await fbRemove(`gabi-tali/lista/${id}`);
  lsSave(); renderLista(); updateBadges();
  showToast('🗑️ Item removido');
}

async function limparFeitos() {
  const feitos = Object.keys(db_lista).filter(id => db_lista[id].done);
  if (feitos.length === 0) { showToast('Nenhum item feito!'); return; }
  for (const id of feitos) { delete db_lista[id]; await fbRemove(`gabi-tali/lista/${id}`); }
  lsSave(); renderLista(); updateBadges();
  showToast(`🗑️ ${feitos.length} item(s) removido(s)`);
}

function toggleUrgente() { urgente = !urgente; updateUrgenteCheck(); }
function updateUrgenteCheck() {
  const el = document.getElementById('checkUrgente');
  el.className = 'form-check' + (urgente ? ' checked' : '');
  el.textContent = urgente ? '✓' : '!';
}

function setFiltroEstoque(f, btn) {
  filtroEstoque = f;
  document.querySelectorAll('#chipsFiltroEstoque .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderEstoque();
}

const nivelInfo = {
  cheio: { label: '🟢 Cheio', cls: 'stock-cheio' },
  ok: { label: '🔵 OK', cls: 'stock-ok' },
  baixo: { label: '🟡 Baixo', cls: 'stock-baixo' },
  zerado: { label: '🔴 Zerado', cls: 'stock-zerado' },
};
const nivelCycle = ['cheio', 'ok', 'baixo', 'zerado'];

function renderEstoque() {
  const q = (document.getElementById('searchEstoque')?.value || '').toLowerCase();
  let prods = Object.values(db_estoque);
  if (filtroEstoque !== 'todos') prods = prods.filter(p => p.nivel === filtroEstoque);
  if (q) prods = prods.filter(p => p.nome.toLowerCase().includes(q));
  prods.sort((a, b) => {
    const order = { zerado: 0, baixo: 1, ok: 2, cheio: 3 };
    if (order[a.nivel] !== order[b.nivel]) return order[a.nivel] - order[b.nivel];
    return a.nome.localeCompare(b.nome);
  });

  const atencao = Object.values(db_estoque).filter(p => p.nivel === 'baixo' || p.nivel === 'zerado');
  const banner2 = document.getElementById('estoqueAlertBanner');
  if (atencao.length > 0) {
    banner2.classList.add('show');
    document.getElementById('estoqueAlertText').innerHTML = `<strong>${atencao.length} produto(s) precisam de atenção</strong>: ${atencao.map(p => p.nome).join(', ')}`;
  } else { banner2.classList.remove('show'); }

  const container = document.getElementById('estoqueContainer');
  if (prods.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Estoque vazio!</div><div class="empty-sub">Cadastre os produtos da casa</div></div>`;
    return;
  }

  const bycat = {};
  prods.forEach(p => {
    const cat = p.catId ? (db_cats[p.catId] || { nome: 'Outros', emoji: '📦' }) : { nome: 'Geral', emoji: '📦' };
    if (!bycat[cat.nome]) bycat[cat.nome] = { cat, prods: [] };
    bycat[cat.nome].prods.push(p);
  });

  let html = '';
  Object.values(bycat).forEach(({ cat, prods: ps }) => {
    html += `<div class="section-divider" style="padding:10px 14px 4px; border-bottom:1px solid var(--border)">${cat.emoji} ${cat.nome}</div>`;
    ps.forEach(prod => {
      const ni = nivelInfo[prod.nivel] || nivelInfo.ok;
      const rowCls = prod.nivel === 'baixo' ? 'stock-baixo-row' : prod.nivel === 'zerado' ? 'stock-zerado-row' : '';
      html += `<div class="item-row ${rowCls}">
        <div class="item-info">
          <div class="item-name">${prod.nome}</div>
          <div class="item-meta">
            <span>${prod.qtd || 0} ${prod.unit || 'un'}</span>
            ${prod.obs ? `<span class="item-tag">${prod.obs}</span>` : ''}
          </div>
        </div>
        <div class="item-actions">
          <button class="stock-badge ${ni.cls}" onclick="cycleNivel('${prod.id}')">${ni.label}</button>
          <button class="btn-send-list" onclick="sendToLista('${prod.id}')">→ Lista</button>
          <button class="btn-icon" onclick="openEditEstoque('${prod.id}')">✏️</button>
          <button class="btn-icon danger" onclick="deleteEstoque('${prod.id}')">✕</button>
        </div>
      </div>`;
    });
  });
  container.innerHTML = html;
  updateBadges();
}

function openAddEstoque() {
  document.getElementById('modalEstoqueTitle').textContent = 'Novo produto';
  document.getElementById('editEstoqueId').value = '';
  document.getElementById('inputEstoqueNome').value = '';
  document.getElementById('inputEstoqueQtd').value = '0';
  document.getElementById('inputEstoqueUnit').value = 'un';
  document.getElementById('inputEstoqueNivel').value = 'ok';
  document.getElementById('inputEstoqueObs').value = '';
  refreshCatSelects(null, 'inputEstoqueCat');
  openModal('modalEstoque');
}

function openEditEstoque(id) {
  const p = db_estoque[id];
  if (!p) return;
  document.getElementById('modalEstoqueTitle').textContent = 'Editar produto';
  document.getElementById('editEstoqueId').value = id;
  document.getElementById('inputEstoqueNome').value = p.nome;
  document.getElementById('inputEstoqueQtd').value = p.qtd || 0;
  document.getElementById('inputEstoqueUnit').value = p.unit || 'un';
  document.getElementById('inputEstoqueNivel').value = p.nivel || 'ok';
  document.getElementById('inputEstoqueObs').value = p.obs || '';
  refreshCatSelects(p.catId, 'inputEstoqueCat');
  openModal('modalEstoque');
}

async function saveEstoque() {
  const nome = document.getElementById('inputEstoqueNome').value.trim();
  if (!nome) { showToast('Digite o nome!'); return; }
  const id = document.getElementById('editEstoqueId').value || uid();
  const prod = {
    id, nome,
    qtd: parseFloat(document.getElementById('inputEstoqueQtd').value) || 0,
    unit: document.getElementById('inputEstoqueUnit').value,
    catId: document.getElementById('inputEstoqueCat').value || '',
    nivel: document.getElementById('inputEstoqueNivel').value || 'ok',
    obs: document.getElementById('inputEstoqueObs').value.trim(),
    ts: Date.now()
  };
  db_estoque[id] = prod;
  await fbSet(`gabi-tali/estoque/${id}`, prod);
  lsSave(); closeModal('modalEstoque'); renderEstoque();
  showToast('✅ Produto salvo!');
}

async function cycleNivel(id) {
  const prod = db_estoque[id];
  if (!prod) return;
  prod.nivel = nivelCycle[(nivelCycle.indexOf(prod.nivel) + 1) % nivelCycle.length];
  await fbUpdate(`gabi-tali/estoque/${id}`, { nivel: prod.nivel });
  lsSave(); renderEstoque();
}

async function deleteEstoque(id) {
  delete db_estoque[id];
  await fbRemove(`gabi-tali/estoque/${id}`);
  lsSave(); renderEstoque();
  showToast('🗑️ Produto removido');
}

async function sendToLista(estoqueId) {
  const prod = db_estoque[estoqueId];
  if (!prod) return;
  const existing = Object.values(db_lista).find(i => i.estoqueRef === estoqueId && !i.done);
  if (existing) { showToast('Já está na lista!'); return; }
  const id = uid();
  const item = { id, nome: prod.nome, qtd: 1, unit: prod.unit || 'un', catId: prod.catId || '',
    obs: prod.obs || '', urgente: false, done: false, fromStock: true, estoqueRef: estoqueId, ts: Date.now() };
  db_lista[id] = item;
  await fbSet(`gabi-tali/lista/${id}`, item);
  lsSave(); renderLista(); updateBadges();
  showToast(`🛒 ${prod.nome} adicionado à lista!`);
}

const EMOJI_OPTIONS = ['🥦','🥩','🧀','🍞','🧃','🧹','🧴','🛒','🧊','📦',
  '🍎','🍌','🥕','🍗','🥚','🥛','🧂','🍚','🌽','🫒',
  '🫙','🫘','🥜','🍫','🍬','🍵','☕','🧋','🍺','🥤',
  '🧼','🪥','🧻','🪣','🫧','💊','🩺','🐾','🌸','✨',
  '🎁','📱','💡','🔧','🏠','🚗','👗','💄','🎮','📚'];

const COLOR_OPTIONS = ['#4f9ef8','#818cf8','#7dd3b0','#e88d8d','#f472b6','#a78bfa',
  '#2563eb','#0891b2','#10b981','#f59e0b','#ef4444','#6b7280'];

function renderEmojiGrid() {
  document.getElementById('emojiGrid').innerHTML = EMOJI_OPTIONS.map(e =>
    `<div class="emoji-opt ${e === selectedEmoji ? 'selected' : ''}" onclick="pickEmoji('${e}')">${e}</div>`
  ).join('');
}

function renderColorRow() {
  document.getElementById('colorRow').innerHTML = COLOR_OPTIONS.map(c =>
    `<div class="color-swatch ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickEmoji(e) { selectedEmoji = e; renderEmojiGrid(); updateCatPreview(); }
function pickColor(c) { selectedColor = c; renderColorRow(); updateCatPreview(); }

function updateCatPreview() {
  document.getElementById('previewBox').style.background = selectedColor + '30';
  document.getElementById('previewBox').textContent = selectedEmoji;
  document.getElementById('previewName').textContent = document.getElementById('inputCatNome')?.value || 'Nova categoria';
}

function renderCats() {
  const container = document.getElementById('catListContainer');
  const cats = Object.values(db_cats).sort((a, b) => (a.padrao ? 1 : 0) - (b.padrao ? 1 : 0) || a.nome.localeCompare(b.nome));
  if (cats.length === 0) { container.innerHTML = '<div class="empty"><div class="empty-text">Nenhuma categoria</div></div>'; return; }
  const estoqueCount = id => Object.values(db_estoque).filter(p => p.catId === id).length;
  const listaCount = id => Object.values(db_lista).filter(i => i.catId === id && !i.done).length;
  container.innerHTML = cats.map(cat => `
    <div class="manage-row">
      <div class="manage-emoji-preview" style="background:${cat.cor || '#e8b86d'}30">${cat.emoji}</div>
      <div style="flex:1; min-width:0">
        <div class="manage-name">${cat.nome}</div>
        <div class="manage-info">${estoqueCount(cat.id)} no estoque · ${listaCount(cat.id)} na lista</div>
      </div>
      ${cat.padrao ? '<span class="badge-default">padrão</span>' : ''}
      <button class="btn-sm btn-primary-sm" onclick="openEditCat('${cat.id}')">✏️</button>
      ${!cat.padrao ? `<button class="btn-sm btn-danger-sm" onclick="deleteCat('${cat.id}')">✕</button>` : ''}
    </div>
  `).join('');
}

function openAddCat() {
  document.getElementById('modalCatTitle').textContent = 'Nova categoria';
  document.getElementById('editCatId').value = '';
  document.getElementById('inputCatNome').value = '';
  editCatIsDefault = false; selectedEmoji = '🛒'; selectedColor = '#4f9ef8';
  renderEmojiGrid(); renderColorRow(); updateCatPreview();
  openModal('modalCat');
}

function openEditCat(id) {
  const cat = db_cats[id];
  if (!cat) return;
  document.getElementById('modalCatTitle').textContent = 'Editar categoria';
  document.getElementById('editCatId').value = id;
  document.getElementById('inputCatNome').value = cat.nome;
  editCatIsDefault = !!cat.padrao;
  selectedEmoji = cat.emoji; selectedColor = cat.cor || '#e8b86d';
  renderEmojiGrid(); renderColorRow(); updateCatPreview();
  openModal('modalCat');
}

async function saveCat() {
  const nome = document.getElementById('inputCatNome').value.trim();
  if (!nome) { showToast('Digite o nome!'); return; }
  const id = document.getElementById('editCatId').value || uid();
  const cat = { id, nome, emoji: selectedEmoji, cor: selectedColor, padrao: editCatIsDefault || false };
  db_cats[id] = cat;
  await fbSet(`gabi-tali/cats/${id}`, cat);
  lsSave(); closeModal('modalCat'); renderCats(); refreshCatSelects();
  showToast('✅ Categoria salva!');
}

async function deleteCat(id) {
  const cat = db_cats[id];
  if (!cat) return;
  if (Object.values(db_estoque).some(p => p.catId === id) || Object.values(db_lista).some(i => i.catId === id)) {
    showToast('⚠️ Categoria em uso, não pode excluir'); return;
  }
  delete db_cats[id];
  await fbRemove(`gabi-tali/cats/${id}`);
  lsSave(); renderCats(); refreshCatSelects();
  showToast('🗑️ Categoria removida');
}

function refreshCatSelects(selectedId, targetId) {
  const cats = Object.values(db_cats).sort((a, b) => a.nome.localeCompare(b.nome));
  const opts = cats.map(c => `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.emoji} ${c.nome}</option>`).join('');
  if (targetId) {
    const el = document.getElementById(targetId);
    if (el) el.innerHTML = opts;
  } else {
    const el1 = document.getElementById('inputItemCat');
    const el2 = document.getElementById('inputEstoqueCat');
    if (el1) el1.innerHTML = opts;
    if (el2) el2.innerHTML = opts;
  }
}

function updateBadges() {
  const pendentes = Object.values(db_lista).filter(i => !i.done).length;
  const badge = document.getElementById('badgeLista');
  badge.style.display = pendentes > 0 ? 'flex' : 'none';
  badge.textContent = pendentes > 99 ? '99+' : pendentes;
  const alerta = Object.values(db_estoque).filter(p => p.nivel === 'baixo' || p.nivel === 'zerado').length;
  const badge2 = document.getElementById('badgeEstoque');
  badge2.style.display = alerta > 0 ? 'flex' : 'none';
  badge2.textContent = alerta;
}

function openModal(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(overlay.id); });
});

document.getElementById('inputCatNome')?.addEventListener('input', updateCatPreview);

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
